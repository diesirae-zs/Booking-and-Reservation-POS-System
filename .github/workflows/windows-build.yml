name: Generate Windows Installer
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build EXE with jpackage
        run: |
          jpackage --type exe `
            --input dist/ `
            --dest . `
            --name "Booking-and-Reservation-POS" `
            --main-jar ApplicationForCTS.jar `
            --main-class system.mainPage `
            --win-shortcut `
            --win-menu
            
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE-Installer
          path: ./*.exe
